name: batchqr
description: "A new Flutter project."
publish_to: 'none'

version: 1.5.0+6

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1
  qr_flutter: 4.1.0
  barcode_widget: 2.0.4
  google_fonts: ^8.0.2
  csv: 6.0.0
  file_picker: ^10.3.10
  pdf: ^3.11.3
  excel: ^4.0.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  gal: ^2.3.2
  google_mobile_ads: ^7.0.0
  in_app_purchase: ^3.2.3
  shared_preferences: ^2.5.4
  in_app_review: ^2.0.11
  in_app_update: ^4.2.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  flutter_colorpicker: ^1.1.0
  image_cropper: ^11.0.0
  image_picker: ^1.1.2
  printing: ^5.14.2
  mobile_scanner: ^7.0.1
  url_launcher: ^6.3.2
  introduction_screen: ^3.1.14
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4
  archive: ^3.6.1
  open_filex: ^4.6.0
  flutter_file_dialog: ^3.0.3
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_foreground_inset: 12
  adaptive_icon_background: "#1E5BEA"
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_monochrome: "assets/icon.png"

flutter_native_splash:
  color: "#1E5BEA" 
  image: "assets/icon.png"
  android_12:
    image: "assets/icon.png"
    color: "#1E5BEA"
